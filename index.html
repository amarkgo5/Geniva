<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Geniva</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:transparent!important;background-color:transparent!important;user-select:none;-webkit-app-region:no-drag}

  .fairy-wrap{
    position:absolute;bottom:0;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;
  }
  .fairy-img-box{cursor:pointer}
  .fairy-name,.brain-dot{cursor:default}

  .fairy-img-box{
    width:90px;height:105px;position:relative;margin-top:2px;
    display:flex;align-items:center;justify-content:center;
  }

  .fairy-layers{
    position:relative;width:80px;height:86px;
  }
  .fairy-layers img{
    position:absolute;top:0;left:0;width:80px;height:auto;
    image-rendering:pixelated;
  }
  .fairy-body-img{z-index:2}
  .fairy-lwing{z-index:1;transform-origin:85% 40%;animation:flapL 0.8s ease-in-out infinite alternate}
  .fairy-rwing{z-index:1;transform-origin:15% 40%;animation:flapR 0.8s ease-in-out infinite alternate}

  @keyframes flapL{0%{transform:rotate(0deg) scaleX(1)}100%{transform:rotate(6deg) scaleX(0.85)}}
  @keyframes flapR{0%{transform:rotate(0deg) scaleX(1)}100%{transform:rotate(-6deg) scaleX(0.85)}}

  /* Faster flap when thinking */
  .fairy-thinking .fairy-lwing{animation:flapLFast 0.25s ease-in-out infinite alternate}
  .fairy-thinking .fairy-rwing{animation:flapRFast 0.25s ease-in-out infinite alternate}
  @keyframes flapLFast{0%{transform:rotate(0deg) scaleX(1)}100%{transform:rotate(10deg) scaleX(0.75)}}
  @keyframes flapRFast{0%{transform:rotate(0deg) scaleX(1)}100%{transform:rotate(-10deg) scaleX(0.75)}}

  /* Slow flap when talking */
  .fairy-talking .fairy-lwing{animation:flapL 1.2s ease-in-out infinite alternate}
  .fairy-talking .fairy-rwing{animation:flapR 1.2s ease-in-out infinite alternate}

  /* Glow underneath - disabled to prevent transparent artifacts */
  .fairy-glow{display:none}

  /* Animations */
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes bobFast{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes bounce{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
  @keyframes entrance{0%{opacity:0;transform:scale(0.5)}100%{opacity:1;transform:scale(1)}}
  @keyframes sway{0%,100%{transform:translateY(-3px) rotate(0deg)}50%{transform:translateY(-3px) rotate(2deg)}}
  @keyframes sparkle{0%{opacity:0;transform:scale(0)}40%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-14px)}}

  .fairy-img-box{animation:bob 3s ease-in-out infinite}

  /* States */
  .fairy-thinking .fairy-img-box{animation:bobFast 1.2s ease-in-out infinite}
  .fairy-thinking .fairy-body-img{filter:brightness(1.15)}
  .fairy-thinking .fairy-glow{opacity:1.5}
  .fairy-thinking .sparkle{animation-duration:0.6s!important}
  .fairy-thinking .sparkle:nth-child(5),.fairy-thinking .sparkle:nth-child(6){display:block}

  .fairy-done .fairy-img-box{animation:bounce 0.4s ease-out 1}
  .fairy-talking .fairy-img-box{animation:sway 2s ease-in-out infinite}
  .fairy-talking .fairy-body-img{filter:brightness(1.05)}

  .fairy-entrance{animation:entrance 0.6s ease-out forwards}

  /* Sparkles */
  .sparkles{position:absolute;top:-10px;left:-5px;width:110%;height:120%;pointer-events:none}
  .sparkle{
    position:absolute;width:4px;height:4px;border-radius:50%;
    background:#4ade80;animation:sparkle 2s ease-in-out infinite;
    box-shadow:0 0 4px #4ade80;
  }
  .sparkle:nth-child(1){top:8%;left:12%;animation-delay:0s}
  .sparkle:nth-child(2){top:25%;left:88%;animation-delay:0.6s}
  .sparkle:nth-child(3){top:65%;left:8%;animation-delay:1.2s}
  .sparkle:nth-child(4){top:15%;left:75%;animation-delay:1.8s}
  .sparkle:nth-child(5){top:45%;left:55%;animation-delay:0.3s;display:none}
  .sparkle:nth-child(6){top:70%;left:80%;animation-delay:0.9s;display:none}

  .fairy-name{
    font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;
    color:#22cc22;text-align:center;margin-top:0;
    text-shadow:0 0 8px #22ff44;letter-spacing:0.5px;
  }
  .brain-dot{
    width:6px;height:6px;border-radius:50%;margin-top:2px;
    background:#ef4444;transition:background 0.3s;
  }
  .brain-dot.local{background:#ef4444}
  .brain-dot.claude-code{background:#fbbf24}
  .brain-dot.claude-api{background:#4ade80}

  /* Speech Bubble — dark glass style */
  .bubble{
    display:none;position:absolute;z-index:10;
    bottom:155px;left:15px;
    -webkit-app-region:no-drag;
    background:rgba(10,20,12,0.85);
    border:1px solid rgba(34,204,34,0.4);
    border-radius:14px;padding:12px 14px;
    width:280px;
    box-shadow:0 4px 24px rgba(0,0,0,0.5), inset 0 0 20px rgba(34,255,68,0.03);
    backdrop-filter:blur(12px);
    color:#c0f0c8;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;
    line-height:1.4;
  }
  .bubble.visible{display:block}
  .bubble::after{
    content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:8px solid transparent;
    border-right:8px solid transparent;border-top:8px solid rgba(34,204,34,0.4);
  }
  .bubble::before{
    content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:7px solid transparent;
    border-right:7px solid transparent;border-top:7px solid rgba(10,20,12,0.85);z-index:1;
  }
  .bubble-input{
    width:100%;min-height:28px;max-height:80px;outline:none;
    border:none;background:transparent;color:#c0f0c8;font-size:13px;
    font-family:inherit;overflow-y:auto;caret-color:#4ade80;
  }
  .bubble-input:empty::before{content:attr(data-ph);color:rgba(34,204,34,0.4);font-style:italic}
  .bubble-bar{
    display:flex;align-items:center;gap:6px;margin-top:8px;
    border-top:1px solid rgba(34,204,34,0.15);padding-top:6px;
  }
  .bubble-bar button,.bubble-bar .bb-link{
    background:none;border:none;cursor:pointer;font-size:12px;padding:2px 4px;
  }
  .btn-send-bubble{color:#4ade80;font-size:16px;font-weight:bold;margin-left:auto}
  .btn-send-bubble:hover{color:#22ff44;text-shadow:0 0 8px #22ff44}
  .btn-clip{color:#558855;font-size:14px}
  .btn-clip:hover{color:#4ade80}
  .bb-link{color:#558855;font-size:10px;text-decoration:underline;cursor:pointer}
  .bb-link:hover{color:#4ade80}
  .brain-dots{display:flex;gap:3px;margin-left:4px}
  .brain-dots span{
    width:7px;height:7px;border-radius:50%;cursor:pointer;
    opacity:0.4;transition:opacity 0.2s;
  }
  .brain-dots span:hover,.brain-dots span.active{opacity:1}
  .brain-dots .bd-local{background:#ef4444}
  .brain-dots .bd-cc{background:#fbbf24}
  .brain-dots .bd-api{background:#4ade80}

  .bubble-response{white-space:pre-wrap;word-wrap:break-word;color:#c0f0c8}
  .bubble-expand{
    color:#4ade80;font-size:11px;cursor:pointer;margin-top:4px;
    display:inline-block;
  }
  .bubble-expand:hover{text-decoration:underline;text-shadow:0 0 6px #22ff44}

  /* Attachment preview */
  .attach-preview{
    display:flex;align-items:center;gap:6px;padding:4px 6px;margin-bottom:6px;
    background:rgba(34,204,34,0.08);border:1px solid rgba(34,204,34,0.2);
    border-radius:8px;font-size:10px;color:#4ade80;
  }
  .attach-preview img{width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid rgba(34,204,34,0.3)}
  .attach-preview .ap-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .attach-preview .ap-rm{background:none;border:none;color:#f87171;cursor:pointer;font-size:12px;padding:2px 4px}
  .attach-preview .ap-rm:hover{color:#ef4444}

  /* Drop overlay */
  .bubble-drop{
    display:none;position:absolute;inset:0;z-index:20;
    background:rgba(10,20,12,0.92);border:2px dashed rgba(74,222,128,0.6);
    border-radius:14px;
    flex-direction:column;align-items:center;justify-content:center;
    color:#4ade80;font-size:12px;gap:4px;
  }
  .bubble-drop.active{display:flex}
  .bubble-drop .drop-icon{font-size:24px;opacity:0.7}

  /* Live activity feed — shows real work above fairy */
  .live-feed{
    display:none;position:absolute;bottom:150px;left:4px;right:4px;top:0;
    overflow:hidden;pointer-events:none;z-index:5;
    flex-direction:column;justify-content:flex-end;
    padding:4px 4px;
  }
  .live-feed.active{display:flex}
  .feed-line{
    font-family:'Cascadia Code','Fira Code',monospace;
    font-size:10px;color:#22cc22;
    text-shadow:0 0 4px rgba(34,255,68,0.4), 0 0 8px rgba(0,0,0,0.9), 1px 1px 2px rgba(0,0,0,1), -1px -1px 2px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.8);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    opacity:0;animation:feedIn 0.3s ease forwards;
    padding:1px 0;line-height:1.3;
  }
  .feed-line.dim{color:rgba(34,204,34,0.35);text-shadow:0 0 6px rgba(0,0,0,0.7), 1px 1px 2px rgba(0,0,0,0.8)}
  @keyframes feedIn{
    0%{opacity:0;transform:translateY(6px)}
    100%{opacity:1;transform:translateY(0)}
  }
  .feed-line.stream{color:#44ee66;font-size:9px}
  .feed-line.tool{color:#fbbf24;text-shadow:0 0 4px rgba(251,191,36,0.3), 0 0 8px rgba(0,0,0,0.9), 1px 1px 2px rgba(0,0,0,1), -1px -1px 2px rgba(0,0,0,1)}
  .feed-line.done{color:#4ade80}
  .feed-line.error{color:#f87171;text-shadow:0 0 4px rgba(248,113,113,0.3), 0 0 8px rgba(0,0,0,0.9), 1px 1px 2px rgba(0,0,0,1), -1px -1px 2px rgba(0,0,0,1)}
</style>
</head>
<body>
<div class="fairy-wrap fairy-entrance" id="fairy-wrap">
  <div class="fairy-img-box" id="fairy-box">
    <div class="fairy-layers">
      <img class="fairy-lwing" src="wing-left.png" draggable="false">
      <img class="fairy-rwing" src="wing-right.png" draggable="false">
      <img class="fairy-body-img" src="geniva-body.png" draggable="false">
    </div>
    <div class="sparkles">
      <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
      <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
    </div>
  </div>
  <div class="fairy-name">Geniva</div>
  <div class="brain-dot local" id="brain-dot" title="Local brain"></div>
</div>

<!-- Live activity feed (visible when working) -->
<div class="live-feed" id="live-feed"></div>

<!-- Speech Bubble -->
<div class="bubble" id="bubble">
  <div class="bubble-drop" id="bubble-drop"><span class="drop-icon">&#128206;</span><span>Drop image or file</span></div>
  <div id="bubble-content">
    <div id="bubble-input-wrap">
      <div id="attach-preview" class="attach-preview" style="display:none">
        <img id="attach-thumb" src=""><span class="ap-name" id="attach-name"></span>
        <button class="ap-rm" id="attach-rm" title="Remove">&#10005;</button>
      </div>
      <div class="bubble-input" id="bubble-input" contenteditable="true" data-ph="Give me a task..."></div>
      <div class="bubble-bar">
        <button class="btn-clip" id="btn-clip" title="Attach image">&#128206;</button>
        <div class="brain-dots">
          <span class="bd-local active" data-b="local" title="Local"></span>
          <span class="bd-cc" data-b="claude-code" title="Claude Code"></span>
          <span class="bd-api" data-b="claude-api" title="Claude API"></span>
        </div>
        <span class="bb-link" id="btn-expand">Open full app &#8599;</span>
        <button class="btn-send-bubble" id="btn-send-bubble" title="Send">&#10148;</button>
      </div>
    </div>
    <div id="bubble-response-wrap" style="display:none">
      <div class="bubble-response" id="bubble-response-text"></div>
      <span class="bubble-expand" id="bubble-tap-expand" style="display:none">... (tap to expand)</span>
    </div>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');

const fairyWrap = document.getElementById('fairy-wrap');
const fairyBox = document.getElementById('fairy-box');
const bubble = document.getElementById('bubble');
const bubbleInput = document.getElementById('bubble-input');
const bubbleInputWrap = document.getElementById('bubble-input-wrap');
const bubbleResponseWrap = document.getElementById('bubble-response-wrap');
const bubbleResponseText = document.getElementById('bubble-response-text');
const bubbleTapExpand = document.getElementById('bubble-tap-expand');
const brainDot = document.getElementById('brain-dot');

const liveFeed = document.getElementById('live-feed');

let currentBrain = 'local';
let bubbleVisible = false;
let bubbleFadeTimer = null;
let attachedImage = null;
let _streamText = '';

// ─── Drag fairy to move window ───
let _dragging = false;
let _dragStart = null;
let _dragTimer = null;

fairyBox.addEventListener('mousedown', (e) => {
  _dragStart = { x: e.screenX, y: e.screenY };
  _dragging = false;
});

document.addEventListener('mousemove', (e) => {
  if (_dragStart) {
    const dx = e.screenX - _dragStart.x;
    const dy = e.screenY - _dragStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      _dragging = true;
      ipcRenderer.send('fairy-drag', { dx, dy });
      _dragStart = { x: e.screenX, y: e.screenY };
    }
  }
});

document.addEventListener('mouseup', () => {
  _dragStart = null;
  if (_dragging) { _dragging = false; return; }
});

// ─── Click-through handling for transparent areas ───
document.addEventListener('mousemove', (e) => {
  const el = document.elementFromPoint(e.clientX, e.clientY);
  // If mouse is over a visible element (fairy, bubble, name, dot), allow clicks
  const isInteractive = el && (
    el.closest('.fairy-img-box') ||
    el.closest('.bubble') ||
    el.closest('.fairy-name') ||
    el.closest('.brain-dot') ||
    el.closest('.bubble-input') ||
    el.closest('.bubble-bar') ||
    el.closest('.bubble-response')
  );
  if (isInteractive || bubbleVisible) {
    ipcRenderer.send('set-ignore-mouse', false);
  } else {
    ipcRenderer.send('set-ignore-mouse', true);
  }
});

// ─── Click fairy to toggle bubble (ignore if was dragging) ───
fairyBox.addEventListener('click', (e) => {
  if (_dragging) return;
  e.stopPropagation();
  if (bubbleVisible) hideBubble();
  else showBubbleInput();
});

fairyBox.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  ipcRenderer.send('show-context-menu');
});

let _bubbleIdleTimer = null;

function resetBubbleIdleTimer() {
  clearTimeout(_bubbleIdleTimer);
  // Restore full opacity if fading
  if (bubbleVisible && bubble.style.opacity !== '1') {
    bubble.style.transition = '';
    bubble.style.opacity = '1';
  }
  _bubbleIdleTimer = setTimeout(() => {
    if (bubbleVisible && bubbleInputWrap.style.display !== 'none') {
      // Only auto-fade the input bubble, not responses
      bubble.style.transition = 'opacity 1.5s ease';
      bubble.style.opacity = '0';
      setTimeout(() => { if (bubble.style.opacity === '0') hideBubble(); }, 1500);
    }
  }, 10000);
}

function showBubbleInput() {
  clearTimeout(bubbleFadeTimer);
  // Expand window to fit bubble above fairy
  const { ipcRenderer: ipc } = require('electron');
  const remote = require('electron').remote || null;
  const win = require('electron').remote ? require('electron').remote.getCurrentWindow() : null;
  ipcRenderer.send('fairy-expand', true);
  bubble.style.opacity = '1';
  bubble.style.transition = '';
  bubbleInputWrap.style.display = '';
  bubbleResponseWrap.style.display = 'none';
  bubble.classList.add('visible');
  bubbleVisible = true;
  positionBubble();
  setTimeout(() => bubbleInput.focus(), 50);
  resetBubbleIdleTimer();
}

function showBubbleResponse(text) {
  clearTimeout(bubbleFadeTimer);
  bubble.style.opacity = '1';
  bubble.style.transition = '';
  bubbleInputWrap.style.display = 'none';
  bubbleResponseWrap.style.display = '';
  if (text.length > 200) {
    bubbleResponseText.textContent = text.substring(0, 200);
    bubbleTapExpand.style.display = 'inline';
  } else {
    bubbleResponseText.textContent = '';
    bubbleTapExpand.style.display = 'none';
    typeText(text);
  }
  bubble.classList.add('visible');
  bubbleVisible = true;
  positionBubble();
  bubbleFadeTimer = setTimeout(() => {
    bubble.style.transition = 'opacity 1.5s ease';
    bubble.style.opacity = '0';
    setTimeout(() => hideBubble(), 1500);
  }, 8000);
}

function typeText(text) {
  let i = 0;
  const iv = setInterval(() => {
    if (i < text.length) { bubbleResponseText.textContent += text[i]; i++; }
    else clearInterval(iv);
  }, 15);
}

function hideBubble() {
  clearTimeout(bubbleFadeTimer);
  clearTimeout(_bubbleIdleTimer);
  bubble.classList.remove('visible');
  bubble.style.opacity = '1';
  bubble.style.transition = '';
  bubbleVisible = false;
  ipcRenderer.send('fairy-expand', false);
}

// Reset idle timer on any interaction with the bubble
bubble.addEventListener('mousemove', () => { if (bubbleVisible) resetBubbleIdleTimer(); });
bubble.addEventListener('mouseenter', () => { if (bubbleVisible) resetBubbleIdleTimer(); });
bubbleInput.addEventListener('input', () => { if (bubbleVisible) resetBubbleIdleTimer(); });
bubbleInput.addEventListener('focus', () => { if (bubbleVisible) resetBubbleIdleTimer(); });

function positionBubble() {
  // Position handled by CSS now
}

// Send
function sendFromBubble() {
  const text = bubbleInput.innerText.trim();
  console.log('[Geniva] Sending:', text);
  if (!text && !attachedImage) { console.log('[Geniva] Empty text, not sending'); return; }
  bubbleInput.innerText = '';
  hideBubble();
  console.log('[Geniva] Invoking geniva-task');
  ipcRenderer.invoke('geniva-task', { message: text || '(attached image)', imagePath: attachedImage });
  clearAttachment();
}

document.getElementById('btn-send-bubble').addEventListener('click', sendFromBubble);
bubbleInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromBubble(); }
});
document.getElementById('btn-clip').addEventListener('click', async () => {
  const fp = await ipcRenderer.invoke('pick-image');
  if (fp) setAttachment(fp);
});

// ─── Attachment preview helpers ───
const attachPreview = document.getElementById('attach-preview');
const attachThumb = document.getElementById('attach-thumb');
const attachName = document.getElementById('attach-name');
document.getElementById('attach-rm').addEventListener('click', () => clearAttachment());

function setAttachment(filePath) {
  attachedImage = filePath;
  const name = filePath.split(/[\\/]/).pop();
  attachName.textContent = name;
  // Show thumbnail for images
  const ext = name.split('.').pop().toLowerCase();
  if (['png','jpg','jpeg','gif','webp','bmp'].includes(ext)) {
    attachThumb.src = 'file:///' + filePath.replace(/\\/g, '/');
    attachThumb.style.display = '';
  } else {
    attachThumb.style.display = 'none';
  }
  attachPreview.style.display = 'flex';
  bubbleInput.focus();
}

function clearAttachment() {
  attachedImage = null;
  attachPreview.style.display = 'none';
  attachThumb.src = '';
  attachName.textContent = '';
}

// ─── Paste support (screenshots & images from clipboard) ───
bubbleInput.addEventListener('paste', async (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = async () => {
        const fp = await ipcRenderer.invoke('save-pasted-image', { dataUrl: reader.result });
        if (fp) setAttachment(fp);
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
});

// ─── Drag and drop support ───
const bubbleDrop = document.getElementById('bubble-drop');
let _dragCounter = 0;

bubble.addEventListener('dragenter', (e) => {
  e.preventDefault();
  _dragCounter++;
  bubbleDrop.classList.add('active');
});
bubble.addEventListener('dragleave', (e) => {
  e.preventDefault();
  _dragCounter--;
  if (_dragCounter <= 0) { _dragCounter = 0; bubbleDrop.classList.remove('active'); }
});
bubble.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
bubble.addEventListener('drop', async (e) => {
  e.preventDefault();
  _dragCounter = 0;
  bubbleDrop.classList.remove('active');

  // Check for dropped files
  if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
    const file = e.dataTransfer.files[0];
    // If the file has a path (local file drag), use it directly
    if (file.path) {
      setAttachment(file.path);
      return;
    }
    // Otherwise read as data URL and save to temp
    const reader = new FileReader();
    reader.onload = async () => {
      const fp = await ipcRenderer.invoke('save-dropped-file', { name: file.name, dataUrl: reader.result });
      if (fp) setAttachment(fp);
    };
    reader.readAsDataURL(file);
  }
});
document.getElementById('btn-expand').addEventListener('click', () => ipcRenderer.send('open-panel'));
bubbleTapExpand.addEventListener('click', () => ipcRenderer.send('open-panel'));

// Brain dots
document.querySelectorAll('.brain-dots span').forEach(d => {
  d.addEventListener('click', () => ipcRenderer.send('set-brain', d.dataset.b));
});

// ─── Live activity feed above fairy ───
let feedActive = false;

function addFeedLine(text, type) {
  if (!feedActive) return;
  // Dim previous lines
  const prev = liveFeed.querySelectorAll('.feed-line:not(.dim)');
  prev.forEach(p => p.classList.add('dim'));

  const line = document.createElement('div');
  line.className = 'feed-line' + (type ? ' ' + type : '');
  line.textContent = text.substring(0, 60);
  liveFeed.appendChild(line);

  // Keep max 8 lines visible
  while (liveFeed.children.length > 8) liveFeed.firstChild.remove();
}

function startFeed() {
  clearTimeout(_feedHideTimer);
  feedActive = true;
  liveFeed.style.transition = '';
  liveFeed.style.opacity = '';
  liveFeed.classList.add('active');
  liveFeed.innerHTML = '';
}

let _feedHideTimer = null;

function stopFeed() {
  feedActive = false;
  // Dim all lines
  const lines = liveFeed.querySelectorAll('.feed-line');
  lines.forEach(l => l.classList.add('dim'));

  // Fade out and hide after 10 seconds
  clearTimeout(_feedHideTimer);
  _feedHideTimer = setTimeout(() => {
    liveFeed.style.transition = 'opacity 1.5s ease';
    liveFeed.style.opacity = '0';
    setTimeout(() => {
      liveFeed.classList.remove('active');
      liveFeed.innerHTML = '';
      liveFeed.style.transition = '';
      liveFeed.style.opacity = '';
    }, 1500);
  }, 10000);
}

// ─── Fairy states ───
function setFairyState(cls) {
  fairyWrap.className = 'fairy-wrap ' + cls;
  if (cls === 'fairy-thinking') startFeed();
  else if (cls === 'fairy-done' || cls === '') stopFeed();
  if (cls === 'fairy-done') setTimeout(() => { fairyWrap.className = 'fairy-wrap'; }, 500);
}

ipcRenderer.on('geniva-thinking', (_, active) => {
  if (active) { setFairyState('fairy-thinking'); _localStreamLine = null; _localStreamText = ''; _localBubbleShown = false; _localTokenCount = 0; }
  else setFairyState('');
});
ipcRenderer.on('geniva-reply', (_, text) => {
  setFairyState('fairy-talking');
  showBubbleResponse(text);
  setTimeout(() => setFairyState(''), 2000);
});

ipcRenderer.on('geniva-activity', (_, text) => {
  let type = '';
  if (text.includes('Calling') || text.includes('\uD83D\uDCC1') || text.includes('\uD83C\uDFA8') || text.includes('\uD83D\uDD0D')) type = 'tool';
  else if (text.includes('\u2705') || text.includes('done')) type = 'done';
  else if (text.includes('\u274C') || text.includes('Error')) type = 'error';
  addFeedLine(text, type);
});

ipcRenderer.on('geniva-done', () => setFairyState('fairy-done'));

// Live local token stream
let _localStreamLine = null;
let _localStreamText = '';
let _localBubbleShown = false;
let _localTokenCount = 0;
ipcRenderer.on('geniva-stream-local', (_, token) => {
  _localStreamText += token;
  _localTokenCount++;

  // Token counter in feed above fairy — always visible
  const feedDisplay = `⚡ ${_localTokenCount} tokens | ${_localStreamText.slice(-45).replace(/\n/g, ' ')}`;
  if (!_localStreamLine || !_localStreamLine.parentNode) {
    _localStreamLine = document.createElement('div');
    _localStreamLine.className = 'feed-line stream';
    liveFeed.appendChild(_localStreamLine);
  }
  _localStreamLine.textContent = feedDisplay;
  liveFeed.scrollTop = liveFeed.scrollHeight;
  while (liveFeed.children.length > 8) liveFeed.firstChild.remove();
});

// Streaming — show chunks in live feed
ipcRenderer.on('geniva-stream-start', () => { _streamText = ''; setFairyState('fairy-talking'); });
ipcRenderer.on('geniva-stream-chunk', (_, chunk) => {
  _streamText += chunk;
  const lines = _streamText.split('\n');
  const lastLine = lines[lines.length - 1];
  if (lastLine.trim()) addFeedLine(lastLine.trim(), 'stream');
});
ipcRenderer.on('geniva-stream-end', () => {
  if (_streamText) showBubbleResponse(_streamText);
  setFairyState('fairy-done');
});

ipcRenderer.on('brain-changed', (_, mode) => {
  currentBrain = mode;
  brainDot.className = 'brain-dot ' + mode;
  brainDot.title = mode + ' brain';
  document.querySelectorAll('.brain-dots span').forEach(d => {
    d.classList.toggle('active', d.dataset.b === mode);
  });
});

// Startup
async function startup() {
  const conn = await ipcRenderer.invoke('check-connections');
  currentBrain = conn.brain;
  brainDot.className = 'brain-dot ' + currentBrain;
  document.querySelectorAll('.brain-dots span').forEach(d => {
    d.classList.toggle('active', d.dataset.b === currentBrain);
  });
  setTimeout(() => showBubbleResponse('Hi! Ready when you are ✨'), 1500);
}
startup();
</script>
</body></html>
